<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Bitcount+Prop+Single+Ink:wght@100..900&family=Bungee&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster&family=Manrope:wght@200..800&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Playwrite+US+Modern:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- TailwindCSS + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./Style/style.css">

    <title>GitHub Issues Tracker | Login</title>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">daisyUI</a>

    <!-- navbar -->
    <header class="bg-base-100 shadow-sm">
        <div class="navbar w-11/12 mx-auto">
            <div class="flex flex-1 items-center gap-2">
                <img width="30px" src="assets/github-logo.png" alt="">
                <h1 class="font-semibold text-lg text-[#1F2937]">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
                        <div class="w-10 rounded-full">
                            <img alt="Tailwind CSS Navbar component"
                                src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" />
                        </div>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <li>
                            <a class="justify-between">
                                Profile
                                <span class="badge">New</span>
                            </a>
                        </li>
                        <li><a>Settings</a></li>
                        <li><a>Logout</a></li>
                    </ul>
                </div>
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>


    
    <main class="bg-[#F8FAFC] pt-[60px]">

        <!-- tabs -->
        <section class="tab-section w-9/12 mx-auto bg-white py-6 pl-6 rounded-lg mb-4">
            <div class="flex flex-wrap gap-3">
                <button id="all-tab" data-tab="all" class="btn btn-primary issue-tab-btn active w-[120px]">
                    All
                </button>
                <button id="open-tab" data-tab="open" class="btn btn-outline btn-primary issue-tab-btn w-[120px]">
                    Open
                </button>
                <button id="closed-tab" data-tab="closed" class="btn btn-outline btn-primary issue-tab-btn w-[120px]">
                    Closed
                </button>
            </div>
        </section>

        <!-- counter container -->
        <section class="counter w-9/12 mx-auto bg-white p-6 rounded-lg border-b border-[#E4E4E7]">
            <div id="counter" class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <div>
                        <img class="bg-[#ECE4FF] rounded-full p-2" src="assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h1 class="font-semibold text-[20px]">50 Issues</h1>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>


                <div class="flex gap-4">
                    <p><i class="fa-solid fa-circle text-[#00A96E]"></i>  Open</p>
                    <p><i class="fa-solid fa-circle text-[#A855F7]"></i>  Closed</p>
                </div>
            </div>
        </section>

        <!-- issues container -->
        <section class="counter w-9/12 mx-auto bg-white p-8 rounded-lg">
            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
            </div>
        </section>


    </main>



    <script src="script/home.js"></script>
</body>

</html>
</html
