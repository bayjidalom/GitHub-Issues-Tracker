<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Bitcount+Prop+Single+Ink:wght@100..900&family=Bungee&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster&family=Manrope:wght@200..800&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Playwrite+US+Modern:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- TailwindCSS + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./Style/style.css">

    <title>GitHub Issues Tracker | Login</title>
</head>

<body>
    <section class="shadow-sm  md:w-3/12 mx-auto rounded-md mw-[520px] w-9/12 p-8 mt-20 md:mt-40">
        <div class="github-head text-center justify-center space-y-6">
            <div class="github-logo flex justify-center">
                <img src="assets/github-logo.png" alt="">
            </div>
            <div class="github-text">
                <h2 class="font-semibold text-[#1F2937] text-xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
        </div>

        <!-- login -->
        <div class="fieldset mb-7">

            <label class="label font-medium text-[#1F2937]">Username</label>
            <input id="username-input" type="text" class="input w-full rounded-sm" placeholder="Enter Username" />

            <label class="label font-medium text-[#1F2937]">Password</label>
            <input id="password-input" type="password" class="input w-full rounded-sm" placeholder="Enter Password" />

            <button id="sign-btn" class="btn btn-primary mt-4">Sign In</button>
        </div>

        <!-- default pass -->
        <div class="text-center">
            <p class="text-[#64748B] text-[14px]">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] p-6 rounded-md">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
    </section>




    <script src="./Script/index.js"></script>
</body>

</html>
